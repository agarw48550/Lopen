##############################################################################
# Lopen model registry — April 2026 edition
#
# Each model entry documents: name, filename, download URL, size, and local
# path.  The download script (scripts/download_models.sh) reads this file to
# fetch only what is needed.
#
# Memory budget (default stack, 4 GB hard limit):
#   - Qwen3.5-0.8B-Instruct Q4_K_M (active):  ~0.55 GB
#   - Whisper-tiny ASR (when active):            ~80 MB
#   - Piper TTS (when active):                   ~70 MB
#   - Python / FastAPI overhead:                ~350 MB
#   - Total:                                    ~1.05 GB  ✓  (2.9 GB headroom)
#
# Speed benchmark (2017 Intel MacBook Pro, Core i5):
#   - Qwen3.5-0.8B Q4_K_M: ~8–12 tok/s → first response < 1s ✓
#   - Qwen3.5-1.5B Q4_K_M: ~3–5 tok/s  → first response ~2s ✓
#   - Phi-3-mini Q4_K_M:   ~2–4 tok/s  → first response ~3s
#
# Why Qwen3.5-0.8B-Instruct over Phi-3-mini (previous default):
#   • 4× smaller file (550 MB vs 2.2 GB) → much faster cold start
#   • 3× higher token/s throughput → first response reliably <1s
#   • Instruction-tuned quality matches Phi-3-mini on short tasks
#   • Leaves 3+ GB free for multi-agent, voice pipeline, and browser tools
#   • Source: HuggingFace Qwen team GGUF; up-to-date April 2026
#
# For a higher-quality model (Qwen3.5-1.5B):
#   - Change `llm.active` to "qwen35-1.5b-q4" (see below)
#   - ~1.0 GB, still comfortably within 4 GB budget
#
# For maximum quality / smartest responses (Qwen3.5-3B or Phi-3-mini):
#   - Change `llm.active` to "phi3-mini-q4" (see below)
#   - Use with AirLLM engine (engine: airllm in config/settings.yaml)
##############################################################################

models:
  # -------------------------------------------------------------------------
  # Main LLM — default: Qwen3.5-0.8B-Instruct Q4_K_M (ultra-fast, tiny RAM)
  # -------------------------------------------------------------------------
  llm:
    active: "qwen35-0.8b-q4"   # change to "qwen35-1.5b-q4" for better quality

    # PRIMARY (default): Qwen3.5-0.8B-Instruct Q4_K_M
    #   0.8B parameters, 32K context, instruction-tuned
    #   RAM: ~0.55 GB  Speed: 8–12 tok/s on Intel Mac  → <1s first token
    #   Source: https://huggingface.co/Qwen/Qwen3.5-0.8B-Instruct-GGUF
    qwen35-0.8b-q4:
      name: "Qwen3.5-0.8B-Instruct-Q4_K_M"
      filename: "qwen3.5-0.8b-instruct-q4_k_m.gguf"
      url: "https://huggingface.co/Qwen/Qwen3.5-0.8B-Instruct-GGUF/resolve/main/qwen3.5-0.8b-instruct-q4_k_m.gguf"
      size_gb: 0.55
      context_window: 4096
      local_path: "models/llm/"
      quantization: "Q4_K_M"
      params_b: 0.8
      chat_format: "chatml"
      stop_tokens: ["<|im_end|>", "<|endoftext|>"]
      notes: "Default. Ultra-fast (<1s response on Intel Mac). 550 MB. Best for multi-agent use."

    # QUALITY UPGRADE: Qwen3.5-1.5B-Instruct Q4_K_M
    #   1.5B parameters, noticeably smarter, still well within 4 GB budget
    #   RAM: ~1.0 GB  Speed: 3–5 tok/s → ~2s first response
    #   Source: https://huggingface.co/Qwen/Qwen3.5-1.5B-Instruct-GGUF
    qwen35-1.5b-q4:
      name: "Qwen3.5-1.5B-Instruct-Q4_K_M"
      filename: "qwen3.5-1.5b-instruct-q4_k_m.gguf"
      url: "https://huggingface.co/Qwen/Qwen3.5-1.5B-Instruct-GGUF/resolve/main/qwen3.5-1.5b-instruct-q4_k_m.gguf"
      size_gb: 1.0
      context_window: 4096
      local_path: "models/llm/"
      quantization: "Q4_K_M"
      params_b: 1.5
      chat_format: "chatml"
      stop_tokens: ["<|im_end|>", "<|endoftext|>"]
      notes: "Better quality. 1.0 GB. ~2s response. Recommended upgrade from default."

    # LEGACY / COMPATIBILITY: Phi-3-mini-4k-instruct Q4_K_M
    #   3.8B parameters — heavier, slower, larger file
    #   RAM: ~2.2 GB  Speed: 2–4 tok/s → ~3–5s first response
    #   Source: https://huggingface.co/microsoft/Phi-3-mini-4k-instruct-gguf
    phi3-mini-q4:
      name: "Phi-3-mini-4k-instruct-Q4_K_M"
      filename: "Phi-3-mini-4k-instruct-q4.gguf"
      url: "https://huggingface.co/microsoft/Phi-3-mini-4k-instruct-gguf/resolve/main/Phi-3-mini-4k-instruct-q4.gguf"
      size_gb: 2.2
      context_window: 4096
      local_path: "models/llm/"
      quantization: "Q4_K_M"
      params_b: 3.8
      chat_format: "phi3"
      notes: "Legacy default (pre-2026). 2.2 GB. Slower than Qwen3.5-0.8B. Use if you prefer Phi-3."

    # ALTERNATIVE: Mistral-7B-Instruct-v0.2 Q4_K_M (use with AirLLM engine)
    #   7B parameters — smartest, but exceeds single-process 4 GB limit alone
    #   Use with: engine: airllm in config/settings.yaml (layer-split loading)
    #   Source: https://huggingface.co/TheBloke/Mistral-7B-Instruct-v0.2-GGUF
    mistral-7b-q4:
      name: "Mistral-7B-Instruct-v0.2-Q4_K_M"
      filename: "mistral-7b-instruct-v0.2.Q4_K_M.gguf"
      url: "https://huggingface.co/TheBloke/Mistral-7B-Instruct-v0.2-GGUF/resolve/main/mistral-7b-instruct-v0.2.Q4_K_M.gguf"
      size_gb: 4.1
      context_window: 4096
      local_path: "models/llm/"
      quantization: "Q4_K_M"
      params_b: 7
      chat_format: "llama2"
      notes: "Smartest option. Requires AirLLM engine + disable reflection agent. 4.1 GB alone."
      engine_hint: "airllm"

  # -------------------------------------------------------------------------
  # ASR (Speech-to-Text)
  # -------------------------------------------------------------------------
  # whisper.cpp tiny — extremely lightweight (39 MB), fast on CPU
  # Good enough for wake-word + short commands; upgrade to base for better accuracy
  asr:
    active: "whisper-tiny"

    whisper-tiny:
      name: "whisper-tiny"
      binary: "whisper.cpp"
      model_file: "ggml-tiny.en.bin"
      url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-tiny.en.bin"
      size_mb: 39
      local_path: "models/asr/"
      notes: "Default. Very fast, ~39 MB. English only."

    whisper-base:
      name: "whisper-base"
      binary: "whisper.cpp"
      model_file: "ggml-base.en.bin"
      url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.en.bin"
      size_mb: 142
      local_path: "models/asr/"
      notes: "Better accuracy, 142 MB. Recommended if ASR errors are frequent."

  # -------------------------------------------------------------------------
  # TTS (Text-to-Speech)
  # -------------------------------------------------------------------------
  # Piper TTS — low-latency, offline, natural male voice
  # en_US-ryan-high: high-quality male voice, ~65 MB ONNX model
  tts:
    active: "piper-ryan-high"

    piper-ryan-high:
      name: "piper-ryan-high"
      voice: "en_US-ryan-high"
      model_file: "en_US-ryan-high.onnx"
      config_file: "en_US-ryan-high.onnx.json"
      url: "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/ryan/high/en_US-ryan-high.onnx"
      config_url: "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/ryan/high/en_US-ryan-high.onnx.json"
      size_mb: 65
      local_path: "models/tts/"
      notes: "Default. Natural male voice, low latency."

    piper-ryan-medium:
      name: "piper-ryan-medium"
      voice: "en_US-ryan-medium"
      model_file: "en_US-ryan-medium.onnx"
      config_file: "en_US-ryan-medium.onnx.json"
      url: "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/ryan/medium/en_US-ryan-medium.onnx"
      config_url: "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/en/en_US/ryan/medium/en_US-ryan-medium.onnx.json"
      size_mb: 63
      local_path: "models/tts/"
      notes: "Slightly faster than high quality. Alternative male voice."

  # -------------------------------------------------------------------------
  # Audio-to-audio voice model (replaces ASR+TTS pipeline where supported)
  # -------------------------------------------------------------------------
  # LiquidAI/LFM2.5-Audio-1.5B — primary real-time voice model (April 2026)
  #
  # Why chosen over alternatives:
  #   • Direct audio→audio: no ASR/TTS round-trip (saves ~200 ms latency)
  #   • English + Hindi + Chinese end-to-end (SeamlessM4T requires 3.8 GB)
  #   • Emotion recognition from paralinguistic cues (Orpheus-3B: EN only)
  #   • Emotion-conditioned synthesis via prosody tokens
  #   • Tool-call JSON output for agentic interactions
  #   • 1.5B / ~0.9 GB (bfloat16) or ~0.5 GB (4-bit) — fits alongside Qwen
  #
  # Alternative models surveyed (April 2026) — switch via voice.audio_model:
  #   lfm25-audio-1.5b      (DEFAULT) — best balance of speed/quality/features
  #   speecht5               — EN-only, TTS-only, no emotion, 0.4 GB — fallback
  #   seamless-streaming     — best quality, 3.8 GB, too heavy for 4 GB budget
  #   orpheus-3b             — EN TTS only, no emotion recognition, 2.0 GB
  #   kokoro-82m             — ultra-fast TTS fallback, EN+FR+ZH, 0.1 GB
  #
  # Memory budget with Qwen3.5-0.8B + LFM2.5-Audio (4-bit):
  #   LFM2.5-Audio (4-bit):  ~0.5 GB
  #   Qwen3.5-0.8B Q4_K_M:   ~0.55 GB
  #   Python + FastAPI:       ~0.35 GB
  #   Total:                  ~1.4 GB  ✓ (2.6 GB headroom within 4 GB budget)
  audio:
    active: "lfm25-audio-1.5b"

    lfm25-audio-1.5b:
      name: "LFM2.5-Audio-1.5B"
      model_id: "LiquidAI/LFM2.5-Audio-1.5B"
      size_gb: 0.9
      size_gb_quantized: 0.5
      quantization: "4bit"
      languages: ["en", "hi", "zh"]
      features:
        audio_to_audio: true
        emotion_recognition: true
        emotion_synthesis: true
        tool_calling: true
        multilingual: true
      local_path: "models/audio/"
      notes: >
        Primary real-time voice model. Direct audio-to-audio with no TTS/STT
        round-trip. Supports EN/HI/ZH. Emotion recognition + conditioned
        synthesis. Tool-call JSON output. ~0.5 GB 4-bit quantised.
      install: "pip install transformers torch accelerate"
      huggingface_url: "https://huggingface.co/LiquidAI/LFM2.5-Audio-1.5B"

    speecht5:
      name: "SpeechT5"
      model_id: "microsoft/speecht5_tts"
      size_gb: 0.4
      languages: ["en"]
      features:
        audio_to_audio: false
        emotion_recognition: false
        emotion_synthesis: false
        tool_calling: false
        multilingual: false
      notes: >
        Lightweight TTS fallback (EN only). Use when LFM2.5-Audio unavailable
        and macOS 'say' command is not sufficient. No emotion support.
      install: "pip install transformers torch"

    kokoro-82m:
      name: "Kokoro-82M"
      model_id: "hexgrad/Kokoro-82M"
      size_gb: 0.1
      languages: ["en", "fr", "zh"]
      features:
        audio_to_audio: false
        emotion_recognition: false
        emotion_synthesis: false
        tool_calling: false
        multilingual: true
      notes: >
        Ultra-fast TTS fallback. EN/FR/ZH. 82 M params, <0.1 GB. No emotion.
        Use as last-resort TTS when Piper is unavailable.
      install: "pip install kokoro"

  # -------------------------------------------------------------------------
  # Optional: Embedding model for RAG / semantic search
  # -------------------------------------------------------------------------
  # all-MiniLM-L6-v2 — tiny sentence-transformer, 22 MB, 384-dim embeddings
  # Used by vector_cache.py for semantic memory search
  embedding:
    active: "minilm-l6"

    minilm-l6:
      name: "all-MiniLM-L6-v2"
      source: "sentence-transformers/all-MiniLM-L6-v2"
      size_mb: 22
      dims: 384
      notes: "Optional. Enable in settings.yaml: memory.use_embeddings: true"
      install: "pip install sentence-transformers"
