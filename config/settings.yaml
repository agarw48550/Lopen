lopen:
  name: Lopen
  wake_word: Lopen
  log_level: INFO
  log_dir: logs/

# ---------------------------------------------------------------------------
# LLM engine settings
# ---------------------------------------------------------------------------
# engine options:
#   auto       — auto-select best available (airllm → llama_cpp → mock)
#   airllm     — layer-split loading for 7B+ models on 4 GB RAM
#   llama_cpp  — GGUF quantized models via llama-cpp-python (default for 3-4B)
#   mock       — no model, returns placeholder responses (CI/testing)
#
# For Phi-3-mini (2.2 GB) — default, works with multi-agent:
#   engine: auto
#   model_path: models/llm/model.gguf
#
# For Mistral-7B Q4 (4.1 GB) — smarter but requires AirLLM and solo operation:
#   engine: airllm
#   model_path: models/llm/mistral-7b-instruct-v0.2.Q4_K_M.gguf
#   compression: 4bit
#   (also: set agents.ram_budget_gb: 3.8 and enable_reflection: false in agents.yaml)
llm:
  engine: auto          # auto | airllm | llama_cpp | mock
  model_path: models/llm/model.gguf
  context_window: 2048
  temperature: 0.7
  max_tokens: 512
  memory_conservative: true   # unload model between calls (recommended for <4 GB)
  compression: 4bit           # informational; applies to AirLLM backend
  max_gpu_memory: 0           # 0 = CPU-only (correct for 2017 MacBook Pro)

memory:
  max_turns: 20
  summary_threshold: 15  # summarise when turns exceed this
  use_embeddings: false   # set true to enable semantic memory search (requires sentence-transformers)

# ---------------------------------------------------------------------------
# General-purpose intent & routing (no extra RAM — pure Python TF-IDF)
# ---------------------------------------------------------------------------
intent_engine:
  confidence_threshold: 0.2   # below this, fall back to keyword-based planner
  top_k_tools: 3               # how many candidate tools to consider per query

# ---------------------------------------------------------------------------
# Plugin loader — scans tool dirs and third-party plugins automatically
# ---------------------------------------------------------------------------
plugin_loader:
  enabled: true
  auto_discover: true
  tool_dirs:
    - tools
    - tools/third_party

# ---------------------------------------------------------------------------
# Confirmation / sandbox gate
# ---------------------------------------------------------------------------
sandbox:
  confidence_threshold: 0.3      # require confirmation below this confidence
  auto_approve_known_tools: true  # skip confirmation for well-used tools
  min_uses_for_auto_approve: 3    # uses needed to become "known"

# ---------------------------------------------------------------------------
# Usage analytics (local SQLite only — no network calls)
# ---------------------------------------------------------------------------
analytics:
  enabled: true
  log_to_db: true

voice:
  enabled: true
  microphone_index: null  # null = default
  sample_rate: 16000
  wake_word: Lopen
  asr_binary: null  # path to whisper.cpp binary, null = auto-detect
  tts_binary: null  # path to piper binary, null = auto-detect
  tts_voice: en_US-ryan-high  # male voice (legacy fallback TTS)

  # ---------------------------------------------------------------------------
  # Audio-to-audio model (primary pipeline — April 2026)
  # ---------------------------------------------------------------------------
  # Set audio_model to the model_id string (HuggingFace or "none" to disable).
  # When enabled, Lopen uses direct audio-to-audio inference (no ASR/TTS hop).
  # Falls back to classic ASR+LLM+TTS pipeline when audio_model is "none".
  audio_model: "LiquidAI/LFM2.5-Audio-1.5B"   # "none" to disable

  # Language for voice interaction: "en" | "hi" | "zh"
  # The audio model supports all three; legacy ASR (whisper-tiny) is EN only.
  language: "en"

  # Emotion-adaptive interaction:
  #   When true, the audio model detects the user's emotional tone and adapts
  #   the reply's prosody to match (e.g. excited → excited reply, sad → calm).
  emotion_mode: true

  # LLM fallback threshold:
  #   When the audio model emits [DEEP_THINK] / [REASONING_NEEDED] markers,
  #   the query is automatically forwarded to Qwen3.5-0.8B for deep reasoning.
  #   Set to false to disable automatic fallback (audio model handles everything).
  llm_fallback_enabled: true

whatsapp:
  enabled: false  # set to true after QR scan setup
  poll_interval: 30  # seconds
  headless: true

web_dashboard:
  host: 0.0.0.0
  port: 8080
  cors_origins:
    - "*"

orchestrator:
  host: 0.0.0.0
  port: 8000
  workers: 1  # single worker to stay within 4 GB RAM target

health:
  ram_threshold_gb: 4.0
  ram_warning_gb: 3.0
  disk_free_threshold_gb: 5.0
  log_rotation_threshold_mb: 50
  heartbeat_interval: 60  # seconds
  cache_cleanup_interval: 86400  # daily (seconds)

# ---------------------------------------------------------------------------
# Safety (NemoClaw-inspired guardrails)
# ---------------------------------------------------------------------------
# All checks are local — no data leaves the machine.
# Set enabled: false or export LOPEN_SAFETY_DISABLED=1 to bypass entirely.
safety:
  enabled: true
  input_guardrails: true          # block harmful input patterns
  output_guardrails: true         # redact PII from LLM output
  tool_filter: true               # enforce tool allowlist/denylist
  llm_judge: false                # LLM-based safety classification (extra RAM)
  blocklist_path: null            # optional path to custom blocklist .txt file
  topic_blocklist:                # always refuse these topics
    - self_harm
    - illegal_weapons
    - csam
    - bioweapons
    - chemical_weapons
  allowed_tools: []               # empty = all tools allowed (except denied)
  denied_tools:                   # always blocked tools
    - dangerous_shell_exec
    - raw_subprocess
    - system_format

# ---------------------------------------------------------------------------
# Multi-agent dispatcher (OMLX-inspired)
# ---------------------------------------------------------------------------
# Detailed pool config lives in config/agents.yaml
# This section enables/disables the dispatcher integration in the orchestrator
multi_agent:
  enabled: true                   # set false to use single-agent mode
  config_path: config/agents.yaml


# ---------------------------------------------------------------------------
# Notion integration (student workflow — read-only)
# ---------------------------------------------------------------------------
# Set NOTION_TOKEN, NOTION_ASSIGNMENTS_DB, NOTION_NOTES_DB in .env
# sync_interval_seconds: how often to refresh the local cache (default: 1 hour)
notion:
  enabled: false                  # set true after adding NOTION_TOKEN to .env
  sync_interval_seconds: 3600     # 1 hour
  cache_db: storage/notion_cache.db

# ---------------------------------------------------------------------------
# Project Pulse (task tracking with burndown)
# ---------------------------------------------------------------------------
project_pulse:
  enabled: true
  db: storage/project_pulse.db
  deadline_alert_days: [0, 1, 3]  # alert N days before deadline

# ---------------------------------------------------------------------------
# SSH API (remote access from MacBook Air)
# ---------------------------------------------------------------------------
# Usage: ssh -L 8001:localhost:8001 user@<macbook-ip>
# Then: curl -H "Authorization: Bearer $LOPEN_SSH_API_KEY" http://localhost:8001/query -d '{"query":"hi"}'
# Set LOPEN_SSH_API_KEY in .env
ssh_api:
  enabled: false                  # set true to start the SSH API service
  host: 127.0.0.1
  port: 8001

# ---------------------------------------------------------------------------
# System health watchdog (4 GB target hardware)
# ---------------------------------------------------------------------------
watchdog:
  warning_gb: 3.2                 # unload LLM model to free memory
  critical_gb: 3.6                # restart heavy services
  halt_gb: 3.8                    # emergency stop
  check_interval_seconds: 30
