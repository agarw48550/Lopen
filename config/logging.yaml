version: 1
disable_existing_loggers: false

# ---------------------------------------------------------------------------
# Formatters
# ---------------------------------------------------------------------------
# standard   — human-readable (used by console and file handlers)
# debug      — verbose: adds module + function name + line number
# json       — structured JSON output (useful for log aggregators / grep)
# ---------------------------------------------------------------------------
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

  debug:
    format: "%(asctime)s [%(levelname)s] %(name)s (%(module)s.%(funcName)s:%(lineno)d): %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

  json:
    # Requires python-json-logger: pip install python-json-logger
    # Falls back to standard formatter if not installed
    format: "%(asctime)s %(levelname)s %(name)s %(module)s %(funcName)s %(lineno)d %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

# ---------------------------------------------------------------------------
# Handlers
# ---------------------------------------------------------------------------
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  # Debug console — activated when LOPEN_DEBUG=1 or --debug flag is used
  debug_console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: debug
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: logs/lopen.log
    maxBytes: 52428800  # 50 MB
    backupCount: 5
    encoding: utf-8

  debug_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: debug
    filename: logs/lopen_debug.log
    maxBytes: 20971520  # 20 MB
    backupCount: 3
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: standard
    filename: logs/lopen_error.log
    maxBytes: 10485760  # 10 MB
    backupCount: 3
    encoding: utf-8

# ---------------------------------------------------------------------------
# Loggers
# ---------------------------------------------------------------------------
loggers:
  lopen:
    level: DEBUG
    handlers: [console, file, error_file]
    propagate: false

  lopen.orchestrator:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  lopen.agent:
    level: DEBUG
    handlers: [file]
    propagate: true

  lopen.llm:
    level: DEBUG
    handlers: [file]
    propagate: true

  lopen.safety:
    level: INFO
    handlers: [console, file]
    propagate: false

  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false

  uvicorn.error:
    level: INFO
    handlers: [console, error_file]
    propagate: false

  uvicorn.access:
    level: WARNING
    handlers: [file]
    propagate: false

root:
  level: WARNING
  handlers: [console, file]
